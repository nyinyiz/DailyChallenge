name: Build

on:
  pull_request:
    branches:
      - main
    types:
      - closed

permissions:
  contents: read

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Decode Android signing keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.keystore"

      - name: Build project
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: >
          ./gradlew build --stacktrace
          -x composeApp:compileKotlinIosX64
          -x composeApp:compileKotlinIosArm64
          -x composeApp:compileKotlinIosSimulatorArm64
          -x composeApp:compileTestKotlinIosX64
          -x composeApp:compileTestKotlinIosArm64
          -x composeApp:compileTestKotlinIosSimulatorArm64
          -x composeApp:linkDebugFrameworkIosX64
          -x composeApp:linkReleaseFrameworkIosX64
          -x composeApp:linkDebugFrameworkIosArm64
          -x composeApp:linkReleaseFrameworkIosArm64
          -x composeApp:linkDebugFrameworkIosSimulatorArm64
          -x composeApp:linkReleaseFrameworkIosSimulatorArm64
          -x composeApp:linkDebugTestIosX64
          -x composeApp:linkDebugTestIosArm64
          -x composeApp:linkDebugTestIosSimulatorArm64
          -x composeApp:iosX64Test
          -x composeApp:iosSimulatorArm64Test
