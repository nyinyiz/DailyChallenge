name: Android APK Release

on:
  pull_request:
    branches:
      - main
    types:
      - closed

permissions:
  contents: write

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android-apk:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Decode Android signing keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.keystore"

      - name: Build signed release APK
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew :composeApp:assembleRelease --stacktrace

      - name: Prepare release asset
        run: cp composeApp/build/outputs/apk/release/composeApp-release.apk DailyChallenge-latest.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: DailyChallenge-latest-apk
          path: DailyChallenge-latest.apk
          if-no-files-found: error

      - name: Publish rolling GitHub release
        uses: ncipollo/release-action@v1
        with:
          tag: latest-apk
          name: Latest APK
          artifacts: DailyChallenge-latest.apk
          artifactErrorsFailBuild: true
          allowUpdates: true
          removeArtifacts: true
          replacesArtifacts: true
          makeLatest: true
          body: |
            Latest signed Android release APK built from `main`.

            Commit: `${{ github.sha }}`
            Download: https://github.com/${{ github.repository }}/releases/download/latest-apk/DailyChallenge-latest.apk
